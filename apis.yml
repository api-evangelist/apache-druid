aid: apache-druid
name: Apache Druid
description: >-
  Apache Druid is a high-performance, real-time analytics database governed by the Apache Software Foundation, designed for fast slice-and-dice OLAP queries on event-time data. It features a distributed,
  column-oriented storage engine with automatic rollup, supports both streaming (Kafka, Kinesis) and batch (S3, HDFS, local) data ingestion, and provides a SQL query interface plus a native JSON query API
  via REST. Druid is optimized for sub-second queries at petabyte scale with high concurrency.
